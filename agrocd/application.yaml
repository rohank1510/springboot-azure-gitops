apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springboot-app
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  source:
    repoURL: https://github.com/rohank1510/springboot-azure-gitops
    targetRevision: main
    path: k8s/overlays/dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true